<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spice-as-a-Service</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #1e1e1e; color: #fff; }
        h1 { color: #61dafb; }
        textarea { width: 100%; height: 250px; font-family: 'Courier New', Courier, monospace; font-size: 16px; padding: 10px; background-color: #2d2d2d; color: #d4d4d4; border: 1px solid #444; border-radius: 5px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; background-color: #007acc; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #005f9e; }
        pre { background: #000; color: #00ff00; padding: 20px; overflow-x: auto; border-radius: 5px; margin-top: 20px; font-size: 15px; }
    </style>
</head>
<body>
    <h1>Spice-as-a-Service Dashboard</h1>
    <p>Type your SPICE netlist below (no weird formatting needed!):</p>
    
    <textarea id="netlistInput">NMOS DC Bias Test
Vdd d 0 5V
Vgs g 0 2V
M1 d g 0 0 my_nmos
.model my_nmos NMOS (VTO=1.0 KP=0.02)
.op
.print dc v(d) v(g) i(Vdd)
.end</textarea><br>
    
    <button onclick="runSimulation()">Run Simulation</button>

    <h2>Ngspice Output:</h2>
    <pre id="outputArea">Awaiting circuit data...</pre>

    <script>
        // This Javascript connects the button to your Python API
        async function runSimulation() {
            const netlist = document.getElementById('netlistInput').value;
            const outputArea = document.getElementById('outputArea');
            outputArea.textContent = "Running simulation in the cloud (locally)...";

            try {
                // Send the data to the Python server we built
                const response = await fetch('http://127.0.0.1:8000/simulate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ netlist: netlist })
                });

                const data = await response.json();
                
                if (response.ok) {
                    outputArea.textContent = data.output; // Print the green text
                } else {
                    outputArea.textContent = "Error: " + data.detail;
                }
            } catch (error) {
                outputArea.textContent = "Failed to connect to the server. Make sure Uvicorn is still running in your terminal!";
            }
        }
    </script>
</body>
</html>
